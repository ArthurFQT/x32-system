name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            server/yarn.lock
            bridge/yarn.lock
            web/yarn.lock

      - name: Install server deps
        run: yarn install --frozen-lockfile
        working-directory: server

      - name: Build server
        run: yarn build
        working-directory: server
        env:
          PORT: ${{ secrets.PORT }}
          HOST: ${{ secrets.HOST }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          ACCESS_BASE_URL: ${{ secrets.ACCESS_BASE_URL }}
          BRIDGE_SECRET: ${{ secrets.BRIDGE_SECRET }}

      - name: Install bridge deps
        run: yarn install --frozen-lockfile
        working-directory: bridge

      - name: Build bridge
        run: yarn build
        working-directory: bridge

      - name: Install web deps
        run: yarn install --frozen-lockfile
        working-directory: web

      - name: Build web
        run: yarn build
        working-directory: web
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}